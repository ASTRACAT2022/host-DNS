name: Update Bypasss File

on:
  schedule:
    # Запуск каждый час (в 0 минут)
    - cron: '0 * * * *'
  # Возможность ручного запуска через вкладку Actions
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Run update script
      run: python update_hosts.py

    - name: Commit and push if changed
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add bypasss
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update bypasss file" && git push)
